version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccisland
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ccisland
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccisland"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: