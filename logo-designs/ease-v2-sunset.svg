<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 温暖渐变背景 -->
    <linearGradient id="sunsetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500"/>
      <stop offset="30%" style="stop-color:#ff6b35"/>
      <stop offset="60%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>

    <!-- 岛屿渐变 -->
    <linearGradient id="islandGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a472a"/>
      <stop offset="100%" style="stop-color:#4a7c59"/>
    </linearGradient>

    <!-- 发光 -->
    <filter id="sunGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 圆角裁剪 -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#sunsetGradient)"/>

  <g clip-path="url(#roundedClip)">
    <!-- 太阳 -->
    <circle cx="512" cy="350" r="150" fill="#ffcc00" filter="url(#sunGlow)"/>
    <circle cx="512" cy="350" r="100" fill="#fff5e0"/>

    <!-- E 字母在太阳中心 -->
    <text x="512" y="400" font-family="SF Pro Display, -apple-system, sans-serif" font-size="120" font-weight="800" fill="#ff9500" text-anchor="middle">E</text>

    <!-- 岛屿 -->
    <ellipse cx="512" cy="700" rx="350" ry="120" fill="url(#islandGreen)"/>

    <!-- 棕榈树左 -->
    <g transform="translate(300, 520)">
      <path d="M25 180 Q30 100 35 20" stroke="#5d4037" stroke-width="12" fill="none"/>
      <ellipse cx="35" cy="20" rx="60" ry="18" fill="#2e7d32" transform="rotate(-40 35 20)"/>
      <ellipse cx="35" cy="10" rx="55" ry="16" fill="#388e3c" transform="rotate(40 35 10)"/>
      <ellipse cx="35" cy="5" rx="50" ry="15" fill="#43a047"/>
    </g>

    <!-- 棕榈树右 -->
    <g transform="translate(580, 540)">
      <path d="M25 160 Q28 90 32 15" stroke="#5d4037" stroke-width="10" fill="none"/>
      <ellipse cx="32" cy="15" rx="50" ry="15" fill="#2e7d32" transform="rotate(-35 32 15)"/>
      <ellipse cx="32" cy="8" rx="45" ry="13" fill="#388e3c" transform="rotate(35 32 8)"/>
      <ellipse cx="32" cy="3" rx="42" ry="12" fill="#43a047"/>
    </g>

    <!-- 海浪 -->
    <path d="M0 800 Q256 770 512 800 T1024 800 L1024 1024 L0 1024 Z" fill="#0a1628" opacity="0.4"/>

    <!-- Ease Island 文字 -->
    <text x="512" y="900" font-family="SF Pro Display, -apple-system, sans-serif" font-size="56" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">Ease Island</text>
  </g>
</svg>