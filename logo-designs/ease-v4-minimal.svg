<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极简背景 -->
    <linearGradient id="minimalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>

    <!-- 深色文字 -->
    <linearGradient id="darkText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>

    <!-- 绿色点缀 -->
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>

    <!-- 圆角裁剪 -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#minimalBg)"/>

  <g clip-path="url(#roundedClip)">
    <!-- E 字母 - 极简大号 -->
    <text x="512" y="420" font-family="SF Pro Display, -apple-system, sans-serif" font-size="320" font-weight="900" fill="url(#darkText)" text-anchor="middle">E</text>

    <!-- 岛屿线条 - 极简 -->
    <path d="M200 650 Q350 600 512 650 Q650 600 800 650"
          stroke="url(#accentGreen)" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- 一个棕榈树图标 - 极简 -->
    <g transform="translate(512, 560)">
      <line x1="0" y1="100" x2="0" y2="0" stroke="#1a1a2e" stroke-width="6"/>
      <path d="M-40 0 Q0 -20 40 0" stroke="url(#accentGreen)" stroke-width="4" fill="none"/>
      <path d="M-35 10 Q0 -10 35 10" stroke="url(#accentGreen)" stroke-width="3" fill="none"/>
    </g>

    <!-- Ease Island 文字 -->
    <text x="512" y="850" font-family="SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="400" fill="#1a1a2e" text-anchor="middle">Ease Island</text>
  </g>
</svg>