<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 深色背景 -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>

    <!-- 青色渐变 -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>

    <!-- 绿色渐变 -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>

    <!-- 发光 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 圆角裁剪 -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#darkBg)"/>

  <g clip-path="url(#roundedClip)">
    <!-- E 字母 - 大号居中 -->
    <text x="512" y="380" font-family="SF Pro Display, -apple-system, sans-serif" font-size="280" font-weight="800" fill="url(#cyanGradient)" text-anchor="middle" filter="url(#neonGlow)">E</text>

    <!-- 岛屿轮廓线条 -->
    <path d="M100 600 Q250 550 400 580 Q512 560 600 580 Q750 550 900 600"
          stroke="url(#greenGradient)" stroke-width="4" fill="none" filter="url(#neonGlow)" stroke-linecap="round"/>

    <!-- 岛屿底部 -->
    <path d="M100 600 Q250 550 400 580 Q512 560 600 580 Q750 550 900 600 L900 700 L100 700 Z"
          fill="#1a472a" opacity="0.3"/>

    <!-- 小岛点缀 -->
    <circle cx="300" cy="620" r="30" fill="#43a047" opacity="0.4"/>
    <circle cx="512" cy="590" r="40" fill="#4ade80" opacity="0.3"/>
    <circle cx="700" cy="620" r="30" fill="#43a047" opacity="0.4"/>

    <!-- ease 文字 -->
    <text x="512" y="800" font-family="SF Pro Display, -apple-system, sans-serif" font-size="64" font-weight="300" fill="url(#cyanGradient)" text-anchor="middle" opacity="0.8">ease</text>
  </g>
</svg>