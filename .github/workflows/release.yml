name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      product_name:
        description: 'Product name displayed in the app (e.g., Ease-Island)'
        required: false
        default: 'Ease-Island'
        type: string

jobs:
  # ===== Cloud Server Build =====
  build-cloud-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: 'x86_64-unknown-linux-gnu'
            name: 'Linux x86_64'
            platform: 'ubuntu-22.04'
          - target: 'aarch64-unknown-linux-gnu'
            name: 'Linux ARM64'
            platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}
          workspaces: 'cloud-server -> cloud-server/target'

      - name: Install cross-compilation tools (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build cloud server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd cloud-server
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          mkdir -p cloud-server-dist
          cp cloud-server/target/${{ matrix.target }}/release/cc-island-cloud cloud-server-dist/
          # Copy migrations
          cp -r cloud-server/migrations cloud-server-dist/
          # Copy docker-compose.yml
          cp cloud-server/docker-compose.yml cloud-server-dist/
          # Create .env.example
          echo "DATABASE_URL=postgres://ccisland:password@localhost:5432/ccisland" > cloud-server-dist/.env.example
          echo "WS_PORT=17528" >> cloud-server-dist/.env.example
          echo "CLEANUP_INTERVAL_SECS=3600" >> cloud-server-dist/.env.example
          echo "MAX_DEVICE_AGE_SECS=86400" >> cloud-server-dist/.env.example
          # Create README
          echo "# CC-Island Cloud Server" > cloud-server-dist/README.md
          echo "" >> cloud-server-dist/README.md
          echo "## Quick Start" >> cloud-server-dist/README.md
          echo "" >> cloud-server-dist/README.md
          echo "1. Start PostgreSQL: docker-compose up -d" >> cloud-server-dist/README.md
          echo "2. Set DATABASE_URL in .env file" >> cloud-server-dist/README.md
          echo "3. Run: ./cc-island-cloud" >> cloud-server-dist/README.md
          # Create archive
          cd cloud-server-dist
          tar -czvf cc-island-cloud-${{ matrix.target }}.tar.gz *

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-island-cloud_${{ matrix.target }}
          path: cloud-server-dist/cc-island-cloud-${{ matrix.target }}.tar.gz
          retention-days: 7

  # ===== Mobile App Build (Android) =====
  build-mobile-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        run: |
          cd mobile-app
          pnpm install

      - name: Build web app
        run: |
          cd mobile-app
          pnpm run build

      - name: Sync Capacitor
        run: |
          cd mobile-app
          npx cap sync android

      - name: Build Android APK
        run: |
          cd mobile-app/android
          ./gradlew assembleRelease --no-daemon

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cc-island-mobile-android_${{ steps.version.outputs.VERSION }}
          path: mobile-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

  # ===== Mobile App Build (iOS - TestFlight) =====
  build-mobile-ios:
    runs-on: macos-latest
    # Only run when secrets are configured
    if: ${{ secrets.FASTLANE_APPLE_ID != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: mobile-app/ios/App

      - name: Install mobile dependencies
        run: |
          cd mobile-app
          pnpm install

      - name: Build web app
        run: |
          cd mobile-app
          pnpm run build

      - name: Sync Capacitor
        run: |
          cd mobile-app
          npx cap sync ios

      - name: Install fastlane
        run: |
          cd mobile-app/ios/App
          bundle install

      - name: Setup Apple credentials
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_APPLE_PASSWORD: ${{ secrets.FASTLANE_APPLE_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        run: |
          # Create .env file for fastlane
          cd mobile-app/ios/App
          echo "FASTLANE_APPLE_ID=${FASTLANE_APPLE_ID}" > .env
          echo "FASTLANE_PASSWORD=${FASTLANE_APPLE_PASSWORD}" >> .env
          echo "FASTLANE_TEAM_ID=${FASTLANE_TEAM_ID}" >> .env

      - name: Build and upload to TestFlight
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_APPLE_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        run: |
          cd mobile-app/ios/App
          bundle exec fastlane ios beta

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload TestFlight info
        uses: actions/upload-artifact@v4
        with:
          name: cc-island-mobile-ios_testflight_${{ steps.version.outputs.VERSION }}
          path: mobile-app/ios/App/build/App.ipa
          retention-days: 7
        continue-on-error: true  # IPA may not exist if upload failed

  # ===== Desktop App Build =====
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'macOS (Apple Silicon)'
            ext: '.dmg'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macOS (Intel)'
            ext: '.dmg'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            name: 'Windows'
            ext: '.msi'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            name: 'Linux'
            ext: '.deb'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set product name
        shell: bash
        run: |
          PRODUCT_NAME="${{ inputs.product_name || 'Ease-Island' }}"
          echo "Setting product name to: $PRODUCT_NAME"
          # Update tauri.conf.json (use perl for cross-platform compatibility)
          perl -pi -e 's/"productName": ".*"/"productName": "'"$PRODUCT_NAME"'"/' src-tauri/tauri.conf.json
          # Verify change
          cat src-tauri/tauri.conf.json | grep productName

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Get product name
        id: product
        run: |
          PRODUCT_NAME="${{ inputs.product_name || 'Ease-Island' }}"
          echo "NAME=$PRODUCT_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ steps.product.outputs.NAME }} ${{ github.ref_name }}'
          releaseBody: 'See assets below.'
          releaseDraft: true
          prerelease: false
          target: ${{ matrix.target }}

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Find artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        id: find-macos
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -type f | head -1)
            echo "DMG=$DMG" >> $GITHUB_OUTPUT
          else
            DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null || find src-tauri/target/release/bundle/dmg -name "*.dmg" -type f | head -1)
            echo "DMG=$DMG" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Find artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        id: find-windows
        run: |
          $MSI = (Get-ChildItem -Path src-tauri\target\release\bundle\msi -Filter *.msi -File | Select-Object -First 1).FullName
          $EXE = (Get-ChildItem -Path src-tauri\target\release\bundle\nsis -Filter *.exe -File | Select-Object -First 1).FullName
          echo "MSI=$MSI" >> $env:GITHUB_OUTPUT
          echo "EXE=$EXE" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Find artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        id: find-linux
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f | head -1)
          echo "DEB=$DEB" >> $GITHUB_OUTPUT
          echo "APPIMAGE=$APPIMAGE" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.product.outputs.NAME }}_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}
          path: ${{ steps.find-macos.outputs.DMG }}
          retention-days: 7

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.product.outputs.NAME }}_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}
          path: |
            ${{ steps.find-windows.outputs.MSI }}
            ${{ steps.find-windows.outputs.EXE }}
          retention-days: 7

      - name: Upload artifact (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.product.outputs.NAME }}_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}
          path: |
            ${{ steps.find-linux.outputs.DEB }}
            ${{ steps.find-linux.outputs.APPIMAGE }}
          retention-days: 7

  release:
    needs: [build-cloud-server, build-desktop, build-mobile-android, build-mobile-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.1")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationFile: .github/changelog-configuration.json
          fromTag: "${{ steps.prev_tag.outputs.PREV_TAG }}"
          toTag: "${{ github.ref_name }}"
          commitMode: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.product_name || 'Ease-Island' }} ${{ github.ref_name }}
          body: |
            ## Downloads

            ### Desktop App

            #### macOS
            - DMG for Apple Silicon (M1/M2/M3) and Intel Mac

            **注意：macOS 用户安装后如果提示"文件已损坏"，请运行以下命令：**
            ```bash
            xattr -cr /Applications/Ease-Island.app
            ```
            或前往 系统设置 > 隐私与安全 > 安全性，点击"仍要打开"。

            #### Windows
            - MSI installer and portable EXE

            #### Linux
            - DEB for Debian/Ubuntu and AppImage for universal Linux

            ### Cloud Server

            - `cc-island-cloud_x86_64-unknown-linux-gnu.tar.gz` - Linux x86_64 服务器
            - `cc-island-cloud_aarch64-unknown-linux-gnu.tar.gz` - Linux ARM64 服务器 (如 AWS Graviton)

            **部署步骤：**
            1. 解压: `tar -xzf cc-island-cloud_*.tar.gz`
            2. 启动 PostgreSQL: `docker-compose up -d`
            3. 配置 `.env` 文件 (参考 `.env.example`)
            4. 运行: `./cc-island-cloud`

            ### Mobile App

            #### Android
            - `cc-island-mobile-android_*.apk` - Android APK (unsigned)
            - **安装步骤：**
              1. 下载 APK 到手机
              2. 允许安装未知来源应用
              3. 安装 APK

            #### iOS (TestFlight)
            - iOS 版本通过 TestFlight 内部分发
            - **获取步骤：**
              1. 确保你的 Apple ID 已加入测试团队
              2. 在 iPhone 上安装 TestFlight app
              3. 通过邀请链接或邮件加入测试
              4. 安装 CC-Island Remote

            ---

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
